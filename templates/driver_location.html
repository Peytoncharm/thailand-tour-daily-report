<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Location</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .status { font-size: 18px; color: #333; margin-bottom: 8px; }
  .detail { font-size: 14px; color: #888; margin-bottom: 24px; }
  .booking-info {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 24px;
    text-align: left;
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #4CAF50;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-resend {
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    display: none;
    margin-top: 16px;
  }
  .btn-resend:active { background: #388E3C; }
</style>
</head>
<body>
<div class="card">
  <div class="booking-info" id="bookingInfo"></div>
  <div id="loading">
    <div class="spinner"></div>
    <div class="status">Requesting location...</div>
    <div class="detail">Please allow GPS access</div>
  </div>
  <div id="result" style="display:none">
    <div class="icon" id="resultIcon"></div>
    <div class="status" id="resultStatus"></div>
    <div class="detail" id="resultDetail"></div>
    <button class="btn-resend" id="btnResend" onclick="sendLocation()">Send again</button>
  </div>
</div>
<script>
  const TOKEN = "{{ token }}";
  const POST_URL = "/driver/loc/" + TOKEN;
  const params = new URLSearchParams(window.location.search);

  // Show booking info
  const info = document.getElementById('bookingInfo');
  const name = params.get('name') || '';
  const pickup = params.get('pickup') || '';
  const time = params.get('time') || '';
  let infoHtml = '';
  if (name) infoHtml += '<b>Customer:</b> ' + name + '<br>';
  if (pickup) infoHtml += '<b>Pickup:</b> ' + pickup + '<br>';
  if (time) infoHtml += '<b>Time:</b> ' + time;
  info.innerHTML = infoHtml || 'Transfer booking';

  function showResult(icon, status, detail, showResend) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultStatus').textContent = status;
    document.getElementById('resultDetail').textContent = detail;
    document.getElementById('btnResend').style.display = showResend ? 'inline-block' : 'none';
  }

  function sendLocation() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    if (!navigator.geolocation) {
      showResult('\u274c', 'GPS not supported', 'Please use a newer browser', false);
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const data = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          name: name,
          pickup: pickup,
          time: time
        };
        fetch(POST_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(function(r) { return r.json(); })
        .then(function(j) {
          if (j.status === 'ok') {
            showResult('\u2705', 'Location sent!', j.maps_url || '', true);
          } else {
            showResult('\u274c', 'Send failed', j.message || 'Please try again', true);
          }
        })
        .catch(function(e) {
          showResult('\u274c', 'Network error', 'Check connection and try again', true);
        });
      },
      function(err) {
        var msg = 'Please allow GPS access and try again';
        if (err.code === 1) msg = 'GPS access denied. Please allow in browser settings.';
        if (err.code === 2) msg = 'GPS unavailable. Please try outside.';
        if (err.code === 3) msg = 'GPS timeout. Please try again.';
        showResult('\u274c', 'Cannot get location', msg, true);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  // Auto-send on page load
  sendLocation();
</script>
</body>
</html>
